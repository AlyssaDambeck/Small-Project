<!DOCTYPE html>
<!-- Contacts page header. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Deep Dive |Contacts</title>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="css/contacts.css" rel="stylesheet">	
    <link href="css/mobile.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    
    <script type="text/javascript">
    
    document.addEventListener('DOMContentLoaded', function() {
        readCookie();
        loadContacts();
    }, false);
    </script>
</head>
<body id="contacts-page">
    <div class="top-nav">
        <div style="display: flex; align-items: center; gap: 12px;">
        </div>
    </div>
        <!-- ================= NAVIGATION BAR START ================= -->
<nav class="site-nav">
    <div class="nav-container">
        <a href="Home.html" class="logo">Deep Dive</a>
        <ul class="nav-links" id="navLinks">
            <!-- <li><a href="Home.html">Home</a></li>-->
            <li><a href="about.html">About</a></li>
            <li><a href="Home.html" class="nav-cta">Logout</a></li>
        </ul>
        <button class="nav-toggle" onclick="toggleNav()">☰</button>
    </div>
</nav>
<!-- ================= NAVIGATION BAR END ================= -->
    <div class="tab-bar">
        <div class="tab active" id="contactsTab" onclick="showContacts()">Contacts</div>
        <div class="tab" id="addTab" onclick="showAddForm()">Add Contact</div>
    </div>

<!-- Contacts View -->
<div id="contactsView" class="dashboard">
    <h1>My Contacts</h1>
    <!-- Add welcome message here -->
    <p id="welcomeMessage" style="color: #ffffff; font-size: 18px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);">
        Welcome, <span id="userName"></span>!
    </p>
    <div class="search-container">
        <input
            type="text"
            id="searchText"
            placeholder="Search contacts by name..."
            class="search-bar"
            onkeyup="searchContacts()"
        />
        <button type="button" class="search-button" onclick="searchContacts()">
            🔍 Search
        </button>
    </div>
    <div id="tbody" class="contact-list">
        <!-- Contacts will be loaded here dynamically -->
    </div>
</div>

    <!-- Add Contact Form -->
    <div id="addContactView" class="dashboard" style="display: none;">
        <h1>Add New Contact</h1>
        <form id="addMe" onsubmit="addContact(); return false;">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="contactTextFirst" class="form-input" placeholder="Enter first name" required />
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="contactTextLast" class="form-input" placeholder="Enter last name" required />
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="contactTextNumber" class="form-input" placeholder="555-555-5555" required />
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="contactTextEmail" class="form-input" placeholder="email@example.com" required />
            </div>
            <button type="submit" class="add-button">Add Contact</button>
            <button type="button" class="cancel-button" onclick="showContacts()">Cancel</button>
        </form>
    </div>
   <!-- Delete Confirmation Modal -->
<div id="deleteModal" style="display: none; 
                              position: fixed; 
                              top: 0; 
                              left: 0; 
                              right: 0;
                              bottom: 0;
                              background-color: rgba(0, 0, 0, 0.75); 
                              z-index: 10000;">
    <div style="position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(30, 60, 114, 0.95);
                padding: 35px;
                border-radius: 12px;
                width: 90%;
                max-width: 420px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
                border: 2px solid rgba(100, 150, 200, 0.5);">
        
        <h3 style="color: #fff; 
                   margin: 0 0 20px 0; 
                   font-size: 22px;
                   font-weight: 600;">
            🗑️ Delete Contact?
        </h3>
        
        <p style="color: #e8f4f8; 
                  margin: 0 0 10px 0; 
                  font-size: 15px;
                  line-height: 1.5;">
            Are you sure you want to delete:
        </p>
        
        <p style="color: #ffffff; 
                  margin: 0 0 20px 0; 
                  font-size: 18px;
                  font-weight: bold;
                  padding: 12px;
                  background: rgba(0, 0, 0, 0.2);
                  border-radius: 6px;
                  border-left: 4px solid #ff6b6b;">
            <span id="deleteContactName"></span>
        </p>
        
        <p style="color: #ffb3b3; 
                  font-size: 13px; 
                  margin: 0 0 25px 0;
                  font-style: italic;">
            ⚠️ Warning: This cannot be undone!
        </p>
        
        <div style="display: flex; 
                    gap: 12px; 
                    justify-content: flex-end;">
            <button onclick="cancelDelete()" 
                    style="padding: 10px 24px;
                           background: rgba(255, 255, 255, 0.15);
                           color: #fff;
                           border: 2px solid rgba(255, 255, 255, 0.4);
                           border-radius: 6px;
                           cursor: pointer;
                           font-size: 15px;
                           font-weight: 500;
                           transition: all 0.2s;">
                Cancel
            </button>
            
            <button onclick="confirmDelete()" 
                    style="padding: 10px 24px;
                           background: #d32f2f;
                           color: #fff;
                           border: none;
                           border-radius: 6px;
                           cursor: pointer;
                           font-size: 15px;
                           font-weight: 600;
                           transition: all 0.2s;
                           box-shadow: 0 2px 8px rgba(211, 47, 47, 0.4);">
                Delete
            </button>
        </div>
    </div>
</div>

</body>
</html>
</body>
</html>
