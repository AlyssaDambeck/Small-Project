<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deep Dive - Create an account to start managing your personal contacts.">
    <title>Deep Dive - Sign Up</title>
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/mobile.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
</head>
<body id="signup-page">
<!-- Navigation bar start -->
<nav class="site-nav">
    <div class="nav-container">
        <a href="Home.html" class="logo">Deep Dive</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="Home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="login.html" class="nav-cta">Login</a></li>
        </ul>
        <button class="nav-toggle" onclick="toggleNav()">☰</button>
    </div>
</nav>
<!-- Navigation bar end -->
<h1 id="title">Deep Dive</h1>
<div id="signupDiv">
    <span id="inner-title">Create Account</span>
    
    <div class="input-group">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" placeholder="First Name" autocomplete="given-name"/>
    </div>
    <div class="input-group">
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" placeholder="Last Name" autocomplete="family-name"/>
    </div>
    <div class="input-group">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Username" onkeyup="validateUsername()" autocomplete="username"/>
        <div id="usernameFeedback" style="font-size: 12px; margin-top: 5px; line-height: 1.6;"></div>
    </div>
    <div class="input-group">
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password" onkeyup="validatePassword()" autocomplete="new-password"/>
        <div id="passwordFeedback" style="font-size: 12px; margin-top: 5px; line-height: 1.6;"></div>
    </div>
    <button type="button" id="signupButton" class="buttons" onclick="doSignup();">Sign Up</button>
    <span id="signupResult"></span>
    
    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="login.html">Login here</a>
    </p>
</div>
<!-- Moved scripts to bottom for performance -->
<script type="text/javascript" src="js/md5.js"></script>
<script type="text/javascript" src="js/code.js"></script>
<script>
function toggleNav() {
    document.getElementById("navLinks").classList.toggle("show");
}
</script>
</body>
</html>
